<!DOCTYPE html>
<html>
<head>
<title>Event Registration</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

.container{
background:white;
width:400px;
margin:auto;
margin-top:50px;
padding:20px;
border-radius:10px;
box-shadow:0px 0px 10px gray;
}

input,select{
width:90%;
padding:8px;
margin:10px;
}

button{
background:green;
color:white;
padding:10px;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h2>Event Registration</h2>

<form action="success.html">

<input type="text" placeholder="Enter Name" required>

<input type="email" placeholder="Enter Email" required>

<select required>

<option>Select Event</option>
<option>Workshop</option>
<option>Seminar</option>
<option>Coding Competition</option>

</select>

<br>

<button type="submit">Register</button>

</form>

</div>

</body>
</html>
